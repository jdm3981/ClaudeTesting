<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Meal Planner</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<header class="app-header">
  <h1>&#127869; Meal Planner</h1>
  <nav class="header-nav">
    <a href="/index.html"    class="nav-link">Planner</a>
    <a href="/recipes.html"  class="nav-link">Recipes</a>
    <a href="/shopping.html" class="nav-link">Shopping</a>
  </nav>
  <div class="header-right">
    <div class="week-nav">
      <button class="btn-week-nav" id="btn-prev-week" title="Previous week">&#8249;</button>
      <span class="week-label" id="week-label"></span>
      <button class="btn-week-nav" id="btn-next-week" title="Next week">&#8250;</button>
    </div>
    <button class="btn-search" id="btn-search">&#128269; Search Recipes</button>
  </div>
</header>

<div class="planner-wrapper">
  <div class="planner" id="planner"></div>
</div>

<!-- Search modal -->
<div class="modal-overlay" id="searchModal">
  <div class="modal search-modal">
    <div class="search-modal-header">
      <h2>&#128269; Add Recipe</h2>
      <button class="search-modal-close" id="modal-close-btn" title="Close">&#10005;</button>
    </div>
    <input class="search-input" id="search-input" type="search" placeholder="Search by name or ingredient…" autocomplete="off">
    <div class="tag-filter-row" id="tag-filters"></div>
    <div class="search-results" id="search-results">
      <div class="search-empty">Start typing to find a recipe</div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
